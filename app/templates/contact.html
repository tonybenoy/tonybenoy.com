{% extends "base.html" %}
{% block content %}

<main class="page-section">
	<div class="container-narrow">
		<div class="section-header">
			<h2>Contact Me</h2>
			<p>Get in touch! I'd love to hear from you<span class="blink_text">_</span></p>
		</div>

		{% if success_message %}
		<div class="alert alert-success">
			<i class="fas fa-check-circle"></i> {{ success_message }}
		</div>
		{% endif %}

		{% if error_message %}
		<div class="alert alert-error">
			<i class="fas fa-exclamation-triangle"></i> {{ error_message }}
		</div>
		{% endif %}

		<form method="POST" action="/contact">
			<div class="form-group">
				<label for="name" class="form-label">Name</label>
				<input type="text" class="form-control" id="name" name="name" required
					minlength="2" maxlength="100" placeholder="Your name">
			</div>
			<div class="form-group">
				<label for="email" class="form-label">Email</label>
				<input type="email" class="form-control" id="email" name="email" required
					minlength="5" maxlength="255" placeholder="your.email@example.com">
			</div>
			<div class="form-group">
				<label for="subject" class="form-label">Subject</label>
				<input type="text" class="form-control" id="subject" name="subject" required
					minlength="5" maxlength="200" placeholder="What's this about?">
			</div>
			<div class="form-group">
				<label for="message" class="form-label">Message</label>
				<textarea class="form-control" id="message" name="message" rows="6" required
					minlength="10" maxlength="2000" placeholder="Your message..."></textarea>
			</div>
			<div class="text-center">
				<button type="submit" class="btn btn-primary btn-lg">
					<i class="fas fa-paper-plane"></i> Send Message
				</button>
			</div>
		</form>

		<hr style="border-color: var(--accent-border); margin: 3rem 0">

		<div class="text-center">
			<h5 style="margin-bottom: 1rem; color: var(--text)">Other Ways to Reach Me</h5>
			<div class="social-links">
				<a href="https://www.linkedin.com/in/tonybenoy/" class="social-link" aria-label="LinkedIn">
					<i class="fab fa-linkedin-in"></i>
				</a>
				<a href="https://twitter.com/TonyBenoy" class="social-link" aria-label="Twitter">
					<i class="fab fa-twitter"></i>
				</a>
				<a href="https://github.com/tonybenoy" class="social-link" aria-label="GitHub">
					<i class="fab fa-github"></i>
				</a>
				<a href="mailto:me@tonybenoy.com" class="social-link" aria-label="Email">
					<i class="fas fa-envelope"></i>
				</a>
			</div>
		</div>
	</div>
</main>

{% endblock %}
